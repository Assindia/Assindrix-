<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spielplatz Destroyer</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #222; font-family: sans-serif; }
        
        /* Das Hintergrundbild vom Spielplatz */
        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('spielplatz.jpeg') center/cover no-repeat;
            z-index: 1;
        }

        /* Die Zeichenfläche für die Zerstörung */
        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 2;
            touch-action: none;
        }

        /* Menü-Leiste unten */
        #ui {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            padding: 12px 18px;
            font-size: 14px;
            border-radius: 8px;
            border: 2px solid #fff;
            background: rgba(0,0,0,0.7);
            color: white;
            cursor: pointer;
        }

        button.active {
            background: #e74c3c;
            border-color: #ff0000;
        }
    </style>
</head>
<body>

    <div id="bg"></div>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <button id="btnHammer" class="active">🔨 Hammer</button>
        <button id="btnEraser">🧽 Radierer</button>
        <button id="btnReset">🔄 Neu</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let tool = 'hammer';

        // Leinwand an Bildschirmgröße anpassen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Werkzeugwahl
        document.getElementById('btnHammer').onclick = () => selectTool('hammer');
        document.getElementById('btnEraser').onclick = () => selectTool('eraser');
        document.getElementById('btnReset').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        function selectTool(t) {
            tool = t;
            document.getElementById('btnHammer').className = tool === 'hammer' ? 'active' : '';
            document.getElementById('btnEraser').className = tool === 'eraser' ? 'active' : '';
        }

        // Die Logik für Hammer und Radierer
        function handleAction(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            if (tool === 'hammer') {
                // Hammer-Effekt: Gezackte Risse zeichnen
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + (Math.random() - 0.5) * 60, y + (Math.random() - 0.5) * 60);
                }
                ctx.stroke();
                
                // Ein paar dunkle Splitter dazu
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 5, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // Radierer-Effekt: Pixel löschen
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Events für Maus und Touch
        canvas.addEventListener('mousedown', handleAction);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleAction(e);
        }, { passive: false });

        // Optional: Beim Ziehen radieren/hämmern
        canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleAction(e); });
        canvas.addEventListener('touchmove', (e) => { handleAction(e); });


// Kurze Vibration beim Hammerschlag (Dauer in Millisekunden)
if (navigator.vibrate) {
    navigator.vibrate(50); 
}


    </script>
</body>
</html>
