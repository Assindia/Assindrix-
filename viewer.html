<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein VRML Test</title>
    
    <!-- 1. X_ITE Bibliothek laden -->
    <script src="https://code.create3000.de"></script>
    
    <style>
        /* Ein einfaches Grid-Layout */
        .layout-container {
            display: grid;
            grid-template-columns: 300px 1fr; /* Links fest, rechts flexibel */
            gap: 20px;
            padding: 20px;
            font-family: sans-serif;
        }

        /* Das 3D-Fenster stylen */
        x3d-canvas {
            width: 100%;
            height: 300px;
            background: #000; /* Schwarzer Hintergrund, falls die Welt lädt */
            border: 2px solid #555;
        }

        @media (max-width: 800px) {
            .layout-container { grid-template-columns: 1fr; } /* Stapeln auf dem Handy */
        }
    </style>
</head>
<body>

    <div class="layout-container">
        <!-- Linke Spalte: Infos -->
        <aside>
            <h1>Meine VR-Welt</h1>
            <p>Hier siehst du ein altes VRML-Modell, das mit X_ITE im Browser zum Leben erweckt wurde.</p>
            <p><a href="index.html">Zurück zur Startseite</a></p>
        </aside>

        <!-- Rechte Spalte: Die 3D-Welt -->
        <main>
            <!-- Ersetze 'meine_datei.wrl' durch deinen echten Dateinamen -->
            <x3d-canvas src="bsp5.wrl"></x3d-canvas>
        </main>
    </div>

</body>
</html>
